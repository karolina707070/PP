{% extends 'base.html' %}
{% block content %}
<div class="mb-3">
    <a href="{% url 'request_list' %}" class="btn btn-secondary">← К списку заявок</a>
</div>
<h2>{% if edit %}Редактирование заявки{% else %}Новая заявка{% endif %}</h2>

{% if edit %}
    <div class="alert alert-secondary">
        <strong>ID заявки:</strong> {{ form.instance.id }}
    </div>
{% endif %}

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
</form>
{% endblock %}
