{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Авторизация</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Логин</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'guest' %}" class="text-muted">Продолжить как гость</a>
                </div>
                <hr>
                <div class="text-center">
                    <a href="{% url 'register' %}" class="btn btn-outline-secondary w-100">Создать аккаунт</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
