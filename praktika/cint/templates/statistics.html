{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="mb-3">
    <a href="javascript:history.back()" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Назад
    </a>
    <a href="{% url 'home' %}" class="btn btn-outline-secondary ms-2">
        <i class="bi bi-house-door"></i> На главную
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">
            <i class="bi bi-graph-up"></i> Статистика заявок
        </h4>
    </div>
    <div class="card-body text-center">
        {% if graph %}
            <img src="data:image/png;base64,{{ graph }}" class="img-fluid rounded shadow-sm" style="max-width: 100%;">
        {% else %}
            <div class="alert alert-warning">
                <i class="bi bi-exclamation-triangle"></i> Недостаточно данных для построения графика
            </div>
        {% endif %}
    </div>
</div>

{% endblock %}
